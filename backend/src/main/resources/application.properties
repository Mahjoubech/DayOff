# Application Configuration
spring.application.name=dayoff
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dayoff_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
jwt.secret=dayoff-super-secret-key-256bits-minimum-required-for-security-purpose
jwt.expiration=86400000

# CORS Configuration
spring.websocket.allowed-origins=http://localhost:4200

# Logging Configuration
logging.level.root=INFO
logging.level.io.github.youco.dayoff=DEBUG

