# Application Configuration
spring.application.name=dayoff
server.port=8080

# Load environment variables from .env file
spring.config.import=optional:file:.env[.properties]

# PostgreSQL Database Configuration (from .env)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/DayOff}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Mahjoub@1230}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=dayoff-super-secret-key-256bits-minimum-required-for-security-purpose
jwt.expiration=86400000

# CORS Configuration
spring.websocket.allowed-origins=http://localhost:4200

# Logging Configuration
logging.level.root=INFO
logging.level.io.github.youco.dayoff=DEBUG

